name: Ingestão Ads
on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ingest mock data
        run: |
          curl -X POST ${{ secrets.API_URL }}/api/otimizar \
            -H "Content-Type: application/json" \
            -d '{"budget":5000,"campanhas":[{"nome":"Meta","roas":3.5},{"nome":"Google","roas":2.8}]}'